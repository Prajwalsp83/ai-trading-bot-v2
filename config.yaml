# =============================================================================
# AI Trading Bot — canonical config
# =============================================================================
# Single source of truth for both bots. Bots read this at startup via
# scripts/_config_loader.py. All knobs live here — NO magic numbers in code.
#
# Sensitive values (passwords, tokens) live in .env (gitignored).
# This file IS committed — never put secrets here.
# =============================================================================

# ----- MT5 connection (shared) -----
# Credentials read from env: MT5_LOGIN, MT5_PASSWORD, MT5_SERVER, MT5_PATH
mt5:
  symbol: "GOLD.i#"           # XM Ultra Low gold ticker
  poll_seconds: 60            # how often each bot polls MT5

# ----- Telegram alerts -----
telegram:
  bot_token_env: TELEGRAM_BOT_TOKEN      # read from .env
  chat_id_env: TELEGRAM_CHAT_ID

# ----- Postgres journal (Supabase) -----
# Credentials read from env: DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME
postgres:
  enabled: true               # set false to disable Postgres writes (CSV-only)

# =============================================================================
# RISK & CAPITAL MANAGEMENT — non-negotiable safety layer
# =============================================================================
# Applies equally to both bots. Phase A change: risk_per_trade_pct 0.02 → 0.01.
risk:
  # === Per-trade sizing ===
  risk_per_trade_pct: 0.01            # 1% of equity max per trade
  max_concurrent_positions: 1         # per bot — total 2 across breakout+smc

  # === Daily + total kill-switches ===
  daily_loss_cap_pct: 0.03            # halt new trades at -3% on the day
  max_drawdown_pct: 0.15              # HARD halt all trading at -15% from peak
                                       # — requires manual reset of peak_equity

  # === Cooldown after losing streaks ===
  cooldown_after_consecutive_losses: 2  # after 2 SL hits in a row
  cooldown_minutes_after_losses: 240    # pause new entries for 4 hours
                                         # reset on any win

  # === Reentry block after any exit (win OR loss) ===
  reentry_block_minutes: 120          # prevents mechanical re-entry

  # === 3-tier drawdown scaling ===
  # Each tier: at >= threshold_pct DD from peak, multiply base risk by multiplier.
  # 0.0 = halt new trades entirely until equity recovers above that level.
  dd_tiers:
    - { threshold_pct: 0.12, multiplier: 0.0  }   # 12%+ DD: stop trading
    - { threshold_pct: 0.07, multiplier: 0.25 }   # 7-12%: quarter size
    - { threshold_pct: 0.03, multiplier: 0.50 }   # 3-7%: half size
    - { threshold_pct: 0.0,  multiplier: 1.0  }   # 0-3%: full size

  # === Fractional Kelly sizing (multiplies on top of DD tier) ===
  kelly:
    enabled: true
    lookback_trades: 30                # rolling window
    fraction: 0.25                     # quarter-Kelly (industry safety standard)
    min_trades_required: 10            # use default until we have a sample
    max_multiplier: 2.0                # cap on hot streak
    min_multiplier: 0.25               # floor on cold streak
    default_multiplier: 1.0            # when sample too small

# =============================================================================
# TRADING SESSION FILTER — IST, gold-focused
# =============================================================================
sessions:
  enabled: true
  block_weekend: true
  windows:
    - { name: "London",       start_ist: "12:30", end_ist: "16:30" }
    - { name: "NY_overlap",   start_ist: "18:00", end_ist: "21:00" }
    - { name: "NY_afternoon", start_ist: "21:00", end_ist: "23:30" }

# =============================================================================
# ECONOMIC CALENDAR BLOCK — high-impact USD events
# =============================================================================
calendar:
  enabled: true
  path: ./data/economic_calendar.json
  before_minutes: 30
  after_minutes: 60
  impact_threshold: high
  currencies: ["USD"]

# =============================================================================
# NEWS SENTIMENT — Alpha Vantage (free 25/day)
# Key from env: ALPHA_VANTAGE_KEY
# =============================================================================
news:
  enabled: true
  cache_path: ./data/.av_news_cache.json
  cache_ttl_minutes: 25
  max_age_hours: 6
  block_threshold: 0.35              # block BUY if score < -0.35, SELL if > +0.35

# =============================================================================
# REGIME ROUTER — ADX-based per-strategy weighting
# =============================================================================
regime:
  enabled: true
  adx_period: 14
  adx_trend_min: 25.0
  adx_chop_max: 20.0
  high_vol_pct: 0.95
  weights:
    trend_up:   { breakout: 1.0, smc: 0.3 }
    trend_down: { breakout: 1.0, smc: 0.3 }
    chop:       { breakout: 0.0, smc: 1.0 }
    transition: { breakout: 0.5, smc: 0.5 }
    high_vol:   { breakout: 0.5, smc: 0.5 }
    unknown:    { breakout: 0.0, smc: 0.0 }

# =============================================================================
# STOPS (shared default — strategies can override)
# =============================================================================
stops:
  k_sl: 1.5                            # SL = entry +/- k_sl * ATR
  k_tp: 2.5                            # TP = entry +/- k_tp * ATR (RR 1:1.67)

# =============================================================================
# PER-STRATEGY PARAMS
# =============================================================================
strategies:
  # ----- Breakout-trend bot (mt5_live.py) -----
  breakout:
    magic: 20260522                    # MT5 magic — never change without account migration
    ema_fast: 50
    ema_slow: 200
    atr_period: 14
    atr_min: 10.0                      # absolute ATR floor — skip if below
    atr_pct_min: 0.25                  # percentile floor (loosened from 0.5)
    min_trend_strength: 0.0            # 0 = disabled
    use_4h_trend_gate: false           # loosened — was the strictest condition
    k_sl: 1.5                          # overrides global stops.k_sl if present
    k_tp: 2.5

  # ----- SMC (Smart Money Concepts) bot (mt5_smc.py) -----
  smc:
    magic: 20260601
    htf_pivot: 2                       # 1H swing sensitivity
    ltf_pivot: 2                       # 15m swing sensitivity
    min_impulse_bars: 3
    poi_freshness_bars: 60             # POIs valid ~10 days on H1
    min_poi_score: 2                   # accept OB+FVG overlap alone
    sl_buffer_atr_frac: 0.25           # SL = POI edge ± 0.25*ATR
    require_ltf_choch: false           # loosened — accept POI mitigation alone
    min_rr: 1.5                        # refuse trades with RR < 1.5
    atr_period: 14
    max_structure_lookback_bars: 300   # O(1) cap on structure analysis

# =============================================================================
# ML META-LABELER (shadow mode by default)
# =============================================================================
ml:
  enabled: true                        # if false, ML scoring path is skipped
  shadow_mode: true                    # true = log decisions, don't act
                                       # false = ML can veto trades (only set
                                       # after shadow data validates the model)
  model_path: ./models/meta_labeler.pkl
  meta_path: ./models/meta_labeler.meta.json

# =============================================================================
# DAILY REPORTING
# =============================================================================
reporting:
  daily_summary_hour_ist: 23
  daily_summary_minute_ist: 55

# =============================================================================
# JOURNAL PATHS (CSV backup, even when Postgres is enabled)
# =============================================================================
journals:
  breakout: ./data/mt5_trades.csv
  smc:      ./data/mt5_smc_trades.csv

# =============================================================================
# OPS
# =============================================================================
dashboard:
  port: 8501
  password_env: DASHBOARD_PASSWORD
