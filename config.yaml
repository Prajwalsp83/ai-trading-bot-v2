# =============================================================================
# AI Trading Bot — canonical config
# =============================================================================
# Single source of truth for both bots. Bots read this at startup via
# scripts/_config_loader.py. All knobs live here — NO magic numbers in code.
#
# Sensitive values (passwords, tokens) live in .env (gitignored).
# This file IS committed — never put secrets here.
# =============================================================================

# ----- MT5 connection (shared) -----
# Credentials read from env: MT5_LOGIN, MT5_PASSWORD, MT5_SERVER, MT5_PATH
mt5:
  symbol: "GOLD.i#"           # XM Ultra Low gold ticker
  poll_seconds: 60            # default: how often each bot polls MT5
  # Per-bot overrides (by strategy name). Falls back to poll_seconds above.
  # Bar-based bots (smc) only act on a new M15 bar, so a faster poll just
  # detects bars sooner + heartbeats more; it does NOT add trades or flood
  # the signals table. The scalper re-evaluates intrabar, so it wants a tight
  # poll to catch micro-breakouts/FVG retraces promptly.
  poll_seconds_overrides:
    fvg_scalp: 10

# ----- Telegram alerts -----
telegram:
  bot_token_env: TELEGRAM_BOT_TOKEN      # read from .env
  chat_id_env: TELEGRAM_CHAT_ID

# ----- Postgres journal (Supabase) -----
# Credentials read from env: DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME
postgres:
  enabled: true               # set false to disable Postgres writes (CSV-only)

# =============================================================================
# RISK & CAPITAL MANAGEMENT — non-negotiable safety layer
# =============================================================================
# Applies equally to both bots. Phase A change: risk_per_trade_pct 0.02 → 0.01.
risk:
  # === Per-trade sizing ===
  risk_per_trade_pct: 0.01            # 1% of equity max per trade
                                       # NOTE: cannot drop below 1% on $988 account
                                       # without lot size rounding to 0 (XM min 0.01 lot).
                                       # When equity > $2000, can reduce to 0.005.
  max_concurrent_positions: 1         # per bot — total 2 across breakout+smc

  # === Daily + total kill-switches ===
  daily_loss_cap_pct: 0.03            # halt new trades at -3% on the day
  max_drawdown_pct: 0.15              # HARD halt all trading at -15% from peak
                                       # — requires manual reset of peak_equity

  # === Cooldown after losing streaks ===
  cooldown_after_consecutive_losses: 2  # after 2 SL hits in a row
  cooldown_minutes_after_losses: 240    # pause new entries for 4 hours
                                         # reset on any win

  # === Reentry block after any exit (win OR loss) ===
  reentry_block_minutes: 120          # prevents mechanical re-entry

  # === 3-tier drawdown scaling ===
  # Each tier: at >= threshold_pct DD from peak, multiply base risk by multiplier.
  # 0.0 = halt new trades entirely until equity recovers above that level.
  dd_tiers:
    - { threshold_pct: 0.12, multiplier: 0.0  }   # 12%+ DD: stop trading
    - { threshold_pct: 0.07, multiplier: 0.25 }   # 7-12%: quarter size
    - { threshold_pct: 0.03, multiplier: 0.50 }   # 3-7%: half size
    - { threshold_pct: 0.0,  multiplier: 1.0  }   # 0-3%: full size

  # === Fractional Kelly sizing (multiplies on top of DD tier) ===
  kelly:
    enabled: true
    lookback_trades: 30                # rolling window
    fraction: 0.25                     # quarter-Kelly (industry safety standard)
    min_trades_required: 10            # use default until we have a sample
    max_multiplier: 2.0                # cap on hot streak
    min_multiplier: 0.25               # floor on cold streak
    default_multiplier: 1.0            # when sample too small

# =============================================================================
# TRADING SESSION FILTER — IST, gold-focused
# =============================================================================
sessions:
  enabled: true
  block_weekend: true
  windows:
    - { name: "London",       start_ist: "12:30", end_ist: "16:30" }
    - { name: "NY_overlap",   start_ist: "18:00", end_ist: "21:00" }
    - { name: "NY_afternoon", start_ist: "21:00", end_ist: "23:30" }

# =============================================================================
# ECONOMIC CALENDAR BLOCK — high-impact USD events
# =============================================================================
calendar:
  enabled: true
  path: ./data/economic_calendar.json
  before_minutes: 30
  after_minutes: 60
  impact_threshold: high
  currencies: ["USD"]

# =============================================================================
# NEWS SENTIMENT — Alpha Vantage (free 25/day)
# Key from env: ALPHA_VANTAGE_KEY
# =============================================================================
news:
  enabled: true
  cache_path: ./data/.av_news_cache.json
  cache_ttl_minutes: 25
  max_age_hours: 6
  block_threshold: 0.35              # block BUY if score < -0.35, SELL if > +0.35

# =============================================================================
# REGIME ROUTER — ADX-based per-strategy weighting
# =============================================================================
# Phase C update (2026-05-29) based on walk-forward analysis:
#
# 1. BREAKOUT DISABLED — all weights set to 0. Walk-forward showed only 2/9
#    positive windows over 4 years, PF 1.04 (statistical noise). No edge.
#    Code still runs, but every trade gets halted by risk layer (regime=0).
#    Kept active to log signals for future research / ML training.
#
# 2. SMC WEIGHTS — walk-forward originally said: trends great, chop bad.
#
# Phase H.5 override (2026-06-03) set chop -> SMC 1.0 against the walk-forward
# finding that SMC loses in chop. REVERTED 2026-06-11 (code review): chop -> SMC
# 0.0 restored, the data-supported value. Do not re-enable chop trading until
# the new out-of-sample walk-forward (scripts/walk_forward_oos.py, Phase 3)
# proves SMC has a positive OOS edge in chop. At most 0.25 (half-quarter size)
# if partial evidence appears; full 1.0 needs OOS proof.
regime:
  enabled: true
  adx_period: 14
  adx_trend_min: 25.0
  adx_chop_max: 20.0
  high_vol_pct: 0.95
  weights:
    trend_up:   { breakout: 0.0, smc: 1.0 }   # smc thrives in uptrends
    trend_down: { breakout: 0.0, smc: 1.0 }   # smc thrives in downtrends
    chop:       { breakout: 0.0, smc: 0.0 }   # reverted (code review): SMC loses in chop per walk-forward; needs OOS proof to re-enable
    transition: { breakout: 0.0, smc: 0.5 }   # partial — wait for clarity (unchanged)
    high_vol:   { breakout: 0.0, smc: 0.5 }   # keep partial — vol risk is real
    unknown:    { breakout: 0.0, smc: 0.0 }   # don't trade what we don't classify

# =============================================================================
# STOPS (shared default — strategies can override)
# =============================================================================
stops:
  k_sl: 1.5                            # SL = entry +/- k_sl * ATR
  k_tp: 2.5                            # TP = entry +/- k_tp * ATR (RR 1:1.67)

# =============================================================================
# PER-STRATEGY PARAMS
# =============================================================================
strategies:
  # ----- Breakout-trend bot (mt5_live.py) -----
  breakout:
    magic: 20260522                    # MT5 magic — never change without account migration
    ema_fast: 50
    ema_slow: 200
    atr_period: 14
    atr_min: 10.0                      # absolute ATR floor — skip if below
    atr_pct_min: 0.25                  # percentile floor (loosened from 0.5)
    min_trend_strength: 0.0            # 0 = disabled
    use_4h_trend_gate: false           # loosened — was the strictest condition
    k_sl: 1.5                          # overrides global stops.k_sl if present
    k_tp: 2.5

  # ----- DCA (Dollar-Cost-Averaging) gold buyer (mt5_dca.py) -----
  # Phase H pivot (2026-06-02): after 4 strategies failed to beat buy-and-hold
  # (Sharpe 1.16) and ML couldn't separate signal from noise (AUC 0.58 on
  # 1,350-sample combined dataset), pivoted to dollar-cost averaging.
  # Mathematically optimal for someone with a long-term gold thesis and no
  # demonstrated short-term edge. Set it and forget it.
  #
  # Strategy: Every Monday at London open (12:30 IST), buy a fixed USD amount
  # of gold at market. NO stop loss. NO take profit. Pure accumulation.
  # Risk = capped position size, NOT per-trade risk.
  dca:
    enabled: true                      # master kill-switch for DCA bot
    magic: 20260603                    # new magic — keep separate from SMC positions

    # === Schedule ===
    schedule_cron_ist: "30 12 * * 1"   # 12:30 IST every Monday (London open)
                                        # day-of-week 1 = Monday (Sun=0)
    fire_window_minutes: 30            # tolerance: fire any time in next 30m if missed
                                        # protects against bot restart / network blip

    # === Sizing ===
    buy_amount_usd: 50.0               # nominal USD per buy
    min_lot: 0.01                      # broker minimum (XM Ultra Low)
    max_lot_per_buy: 0.05              # hard cap — refuse if math says > this
    lot_step: 0.01                     # round DOWN to this granularity

    # === Position caps (safety) ===
    max_total_lots: 1.0                # refuse new buys once cumulative >= this
                                        # at $50/wk, 0.01 lot/wk -> 100 weeks to fill (~2yr)
    max_buys_per_day: 1                # defense against scheduler glitch

    # === Exit logic ===
    sell_mode: "never"                 # never | profit_take_pct | trailing_pct | rebalance
                                        # 'never' = pure HODL, manual close only

    # === Reporting ===
    send_buy_telegram: true            # alert on every accumulation
    send_skip_telegram: false          # don't spam on session/cap skips
    journal_csv: ./data/mt5_dca_trades.csv

  # ----- SMC (Smart Money Concepts) bot (mt5_smc.py) -----
  # Phase C update (2026-05-29): switched to 'aggressive_all' params from
  # the parameter sweep. Backtest on 4.24 years showed PF 1.89, Sharpe 0.89,
  # 185 trades, max DD 13.57% — survived 2022 sell-off. CAVEAT: recent 12
  # months (2025-Mar onwards) showed -7R cumulative.
  # Phase H pivot (2026-06-02): SMC DISABLED in favor of DCA. Service should
  # be stopped on VPS — see RUNBOOK.md. Code preserved for possible re-enable.
  smc:
    magic: 20260601
    htf_pivot: 1                       # more sensitive swing detection (was 2)
    ltf_pivot: 2
    min_impulse_bars: 2                # accept 2-bar impulses for OBs (was 3)
    poi_freshness_bars: 120            # POIs valid ~20 days on H1 (was 60)
    min_poi_score: 1                   # accept standalone OB or FVG (was 2)
    sl_buffer_atr_frac: 0.25
    require_ltf_choch: false
    min_rr: 1.0                        # accept 1:1 RR setups (was 1.5)
    atr_period: 14
    max_structure_lookback_bars: 300

# =============================================================================
# ML META-LABELER (shadow mode by default)
# =============================================================================
ml:
  enabled: true                        # if false, ML scoring path is skipped
  shadow_mode: true                    # true = log decisions, don't act
                                       # false = ML can veto trades (only set
                                       # after shadow data validates the model)
  model_path: ./models/meta_labeler.pkl
  meta_path: ./models/meta_labeler.meta.json

# =============================================================================
# DAILY REPORTING
# =============================================================================
reporting:
  daily_summary_hour_ist: 23
  daily_summary_minute_ist: 55

# =============================================================================
# JOURNAL PATHS (CSV backup, even when Postgres is enabled)
# =============================================================================
journals:
  breakout: ./data/mt5_trades.csv
  smc:      ./data/mt5_smc_trades.csv

# =============================================================================
# OPS
# =============================================================================
dashboard:
  port: 8501
  password_env: DASHBOARD_PASSWORD
